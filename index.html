<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, user-scalable=yes">
<title>投票アプリ デモ</title>
<link rel="stylesheet" href="assets/common.css">

<div class="screen">
  <div class="game-landing">
    <h1>投票アプリ デモ</h1>
    <p class="lead">競技を選択してください</p>
    <div class="game-tabs" id="gameTabs"></div>
    <div class="game-list" id="gameList"></div>
  </div>
</div>

<script>
(function () {
  // 3 games (tabs). id = folder name, matches the per-game brand colour.
  var GAMES = [
    { id: 'keiba',    jp: '競馬',        en: 'KEIBA'    },
    { id: 'keirin',   jp: '競輪',        en: 'KEIRIN'   },
    { id: 'autorace', jp: 'オートレース', en: 'AUTORACE' }
  ];

  // ---------------------------------------------------------------------------
  // Link registry — ADD NEW LINKS HERE.
  // Each entry is one page (clean `.do` URL, no `.html`). It is rendered
  // automatically under every game tab, so a single line adds it to all three.
  // ---------------------------------------------------------------------------
  var PAGES = [
    { file: 'SpRaceInfo.do',           name: '出走表（基本情報）',   en: 'Race card — basic info' },
    { file: 'SpRaceInfo2.do',          name: '出走表（前5走）',      en: 'Race card — last 5 races' },
    { file: 'SpOddsVote.do',           name: 'オッズ・投票',         en: 'Odds / vote' },
    { file: 'SpTipsterVote.do',        name: '予想',                 en: 'Tipster predictions' },
    { file: 'SpRaceResultInfo.do',     name: '照会・結果',           en: 'Results' },
    { file: 'SpRaceList.do',           name: '全レース一覧',         en: 'Race list' },
    { file: 'SpRaceRefund.do',         name: '払戻金一覧',           en: 'Refunds' },
    { file: 'SpRaceCalendar.do',       name: '競技場カレンダー',     en: 'Calendar' },
    { file: 'SpCmVoteConfirm.do',      name: '投票内容確認',         en: 'Vote confirm (cart)' },
    { file: 'SpCmVoteConfirmOpcoin.do', name: '投票内容確認（OPコイン）', en: 'Vote confirm — OP coin' }
  ];

  var ARROW = '<span class="g-arrow"><svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.4 0.9L3.91333 1.38C3.76 1.53333 3.68 1.73333 3.68 1.94667C3.68 2.16 3.76 2.36 3.91333 2.51333L9.39333 7.99333L3.90667 13.48C3.75333 13.6333 3.67333 13.8333 3.67333 14.0467C3.67333 14.26 3.75333 14.46 3.90667 14.6133L4.38667 15.0933C4.7 15.4067 5.20667 15.4067 5.52 15.0933L12.0733 8.56C12.2267 8.40667 12.3333 8.20667 12.3333 7.99333C12.3333 7.77333 12.2267 7.57333 12.0733 7.42667L5.54667 0.9C5.39333 0.746667 5.18667 0.666667 4.97333 0.666667C4.76 0.666667 4.55333 0.746667 4.40667 0.9H4.4Z" fill="currentColor"/></svg></span>';

  var tabsEl = document.getElementById('gameTabs');
  var listEl = document.getElementById('gameList');

  function renderList(game) {
    var html = '';
    for (var i = 0; i < PAGES.length; i++) {
      var p = PAGES[i];
      html += '<a class="game-card ' + game.id + '" href="' + game.id + '/' + p.file + '">' +
                '<span class="g-main">' +
                  '<span class="g-name">' + p.name + '</span>' +
                  '<span class="g-en">' + p.en + '</span>' +
                '</span>' + ARROW +
              '</a>';
    }
    listEl.innerHTML = html;
  }

  function select(game) {
    var tabs = tabsEl.children;
    for (var i = 0; i < tabs.length; i++) {
      var on = tabs[i].getAttribute('data-game') === game.id;
      tabs[i].className = 'game-tab ' + tabs[i].getAttribute('data-game') + (on ? ' active' : '');
    }
    renderList(game);
  }

  for (var i = 0; i < GAMES.length; i++) {
    (function (game) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'game-tab ' + game.id;
      btn.setAttribute('data-game', game.id);
      btn.innerHTML = '<span class="t-jp">' + game.jp + '</span><span class="t-en">' + game.en + '</span>';
      btn.addEventListener('click', function () { select(game); });
      tabsEl.appendChild(btn);
    })(GAMES[i]);
  }

  select(GAMES[0]);
})();
</script>
