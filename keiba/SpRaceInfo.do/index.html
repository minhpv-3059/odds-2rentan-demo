<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, user-scalable=yes">
<title>金沢 11R 出走表 基本情報</title>
<link rel="stylesheet" href="../../assets/common.css">

<div class="screen">
  <!-- 出走表 > 基本情報 -->
  <div class="horse-scroll">
    <table class="horse">
      <thead>
        <tr>
          <th class="col-waku">枠<br>番</th>
          <th class="col-num">馬<br>番</th>
          <th class="col-name">馬名<br>性齢/馬体重<br>騎手名(負担重量)</th>
          <th class="col-odds">人気<br>単勝オッズ</th>
          <th class="col-mark">予想印</th>
          <th class="col-tai">連対時<br>馬体重</th>
          <th class="col-rate">連対率<br>(生涯)</th>
          <th class="col-rate">3連対率<br>(生涯)</th>
          <th class="col-res">成績<br>(生涯)</th>
          <th class="col-cond">良成績<br>稍重成績<br>重成績<br>不良成績</th>
          <th class="col-train">調教師<br>(所属)</th>
          <th class="col-blood">父馬/母馬<br>(母父馬)<br>毛色</th>
        </tr>
      </thead>
      <tbody id="horseBody"></tbody>
    </table>
  </div>

  <div class="section-title">コースレコード</div>
  <div class="record-scroll">
    <table class="record">
      <thead>
        <tr>
          <th class="col-rec-date">年月日</th>
          <th>競馬場</th>
          <th>距離</th>
          <th class="col-rec-name">馬名</th>
          <th>騎手</th>
          <th>タイム</th>
          <th>馬場</th>
          <th>斤量</th>
        </tr>
      </thead>
      <tbody id="recordBody"></tbody>
    </table>
  </div>

  <div class="section-title">参考情報</div>
  <div class="ref-list">
    <div class="ref-row">
      <div class="ref-label">60日ぶりの出走</div>
      <div class="ref-items">
        <div class="ref-item">
          <span class="num-badge w8">9</span>
          <div class="ref-text"><div class="rt-name">ナントカテイオー</div><div class="rt-note">61日ぶり出走</div></div>
        </div>
      </div>
    </div>
    <div class="ref-row">
      <div class="ref-label">減量騎手</div>
      <div class="ref-items">
        <div class="ref-item">
          <span class="num-badge w6">6</span>
          <div class="ref-text"><div class="rt-name">鈴木次郎</div><div class="rt-note">☆1kg</div></div>
        </div>
        <div class="ref-item">
          <span class="num-badge w8">10</span>
          <div class="ref-text"><div class="rt-name">佐藤三郎</div><div class="rt-note">☆1kg</div></div>
        </div>
      </div>
    </div>
    <div class="ref-row">
      <div class="ref-label">馬体重増減10kg以上</div>
      <div class="ref-items">
        <div class="ref-item">
          <span class="num-badge w4">4</span>
          <div class="ref-text"><div class="rt-name">テイオーナントカ</div><div class="rt-note">478kg(+15)</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="foot-actions">
    <button type="button" class="reload-link">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 1C5.93 1 1 5.92 1 12C1 18.08 5.93 23 12 23C18.07 23 23 18.07 23 12C23 5.93 18.08 1 12 1ZM11.87 19C8.21 18.93 5.12 15.88 5.01 12.22C4.92 9.3 6.6 6.79 9.07 5.65C9.69 5.36 10.36 5.16 11.07 5.07V3.96C11.07 3.28 11.84 2.87 12.41 3.26L15.74 5.54C16.24 5.88 16.24 6.61 15.74 6.95L12.41 9.23C11.84 9.62 11.07 9.22 11.07 8.53V7.09C10.33 7.22 9.65 7.52 9.07 7.95C7.81 8.86 7 10.34 7 12C7 15.11 9.85 17.56 13.09 16.89C14.96 16.49 16.48 14.99 16.88 13.12C17.14 11.93 16.97 10.78 16.5 9.81C16.28 9.37 16.4 8.83 16.8 8.55C17.28 8.2 17.99 8.34 18.26 8.88C18.73 9.82 18.99 10.87 18.99 12C18.99 15.91 15.79 19.07 11.86 19H11.87Z" fill="currentColor"/></svg></span>
      <span>最新情報に更新する</span>
    </button>
    <div class="notify-row">
      <span class="toggle"></span>
      <span>締切10分前に通知を受け取る</span>
    </div>
  </div>
</div>

<script src="../../assets/common.js"></script>
<script>
  /* ===================== 出走表 > 基本情報 ===================== */
  (function () {
    var CHEV = '<svg class="chev" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.4 0.9L3.91 1.38C3.76 1.53 3.68 1.73 3.68 1.95C3.68 2.16 3.76 2.36 3.91 2.51L9.39 7.99L3.91 13.48C3.75 13.63 3.67 13.83 3.67 14.05C3.67 14.26 3.75 14.46 3.91 14.61L4.39 15.09C4.7 15.41 5.21 15.41 5.52 15.09L12.07 8.56C12.23 8.41 12.33 8.21 12.33 7.99C12.33 7.77 12.23 7.57 12.07 7.43L5.55 0.9C5.39 0.75 5.19 0.67 4.97 0.67C4.76 0.67 4.55 0.75 4.41 0.9H4.4Z" fill="currentColor"/></svg>';

    var starHorse = {
      name: 'スタールーズベルト', sexAge: '牡7', weight: '489kg(-3)',
      jockey: '山田太郎', carry: '56.0',
      pop: '3人気', tai: ['497', '479'], rate2: '13.9%', rate3: '25.0%',
      res: { all: '1-1-0-6', jou: '1-1-0-4', ta: '0-0-0-2', omo: '99-99-99-99' },
      cond: { ryo: '0-0-2-20-0', yaya: '0-0-1-3-3', omo: '0-2-1-2-2', furyo: '99-99-99-99-99' },
      trainer: '調教次', belong: '笠松',
      sire: 'チチウマメイ', dam: 'ハハウマメイ', damSire: '(スタールーズベルト)', coat: '鹿毛'
    };
    function star(over) {
      var h = {}; for (var k in starHorse) h[k] = starHorse[k];
      for (var k2 in over) h[k2] = over[k2]; return h;
    }
    var horses = [
      { num: 1, waku: 1, name: 'ネオアマゾネス', sexAge: '牝8', weight: '486kg(-8)',
        jockey: '筒井勇介', carry: '55.0', pop: '3人気', odds: '34.4', mark: '',
        tai: ['466', '494'], rate2: '32.9%', rate3: '49.3%',
        res: { all: '1-1-0-18', jou: '1-1-0-16', ta: '0-0-0-2', omo: '1-0-0-4' },
        cond: { ryo: '3-9-4-18-34', yaya: '4-1-4-6-15', omo: '3-1-3-9-16', furyo: '3-0-1-4-8' },
        trainer: '調教次', belong: '笠松',
        sire: 'オルフェーヴル', dam: 'グラシャスギフト', damSire: "(Giant's Causeway)", coat: '栗毛' },
      star({ num: 2, waku: 2, odds: '48.2', mark: '◎' }),
      star({ num: 3, waku: 3, odds: '144.2', mark: '▲' }),
      star({ num: 4, waku: 4, odds: '2.9', mark: '×', hot: true }),
      star({ num: 5, waku: 5, odds: '144.2', mark: '' }),
      star({ num: 6, waku: 6, odds: '3.9', mark: '', hot: true }),
      star({ num: 7, waku: 7, odds: '58.2', mark: '○' }),
      star({ num: 8, waku: 7, odds: '', mark: '', cancelled: true }),
      star({ num: 9, waku: 8, odds: '144.2', mark: '' }),
      star({ num: 10, waku: 8, odds: '144.2', mark: '注' })
    ];

    var wakuCount = {};
    horses.forEach(function (h) { wakuCount[h.waku] = (wakuCount[h.waku] || 0) + 1; });
    var wakuSeen = {};

    function statBlock(res) {
      return '<div class="stat-line"><span class="lb">全</span><span class="num">' + res.all + '</span></div>' +
        '<div class="stat-line"><span class="lb">場</span><span class="num">' + res.jou + '</span></div>' +
        '<div class="stat-line"><span class="lb">他</span><span class="num">' + res.ta + '</span></div>' +
        '<div class="stat-line"><span class="lb">重</span><span class="num">' + res.omo + '</span></div>';
    }
    function condBlock(c) {
      return '<div class="cond-line num">' + c.ryo + '</div>' +
        '<div class="cond-line num">' + c.yaya + '</div>' +
        '<div class="cond-line num">' + c.omo + '</div>' +
        '<div class="cond-line num">' + c.furyo + '</div>';
    }
    function horseRow(h) {
      var html = '<tr' + (h.cancelled ? ' class="cancelled"' : '') + '>';
      if (!wakuSeen[h.waku]) {
        wakuSeen[h.waku] = true;
        html += '<td class="waku w' + h.waku + '"' + (wakuCount[h.waku] > 1 ? ' rowspan="' + wakuCount[h.waku] + '"' : '') + '><span class="num">' + h.waku + '</span></td>';
      }
      html += '<td class="cell-num"><span class="num">' + h.num + '</span></td>';
      html += '<td>' +
        '<div class="horse-name">' + h.name + CHEV + '</div>' +
        '<div class="horse-sub">' + h.sexAge + '/' + h.weight + '</div>' +
        '<div class="horse-jockey">' + h.jockey + '(' + h.carry + ')</div>' +
      '</td>';
      if (h.cancelled) {
        html += '<td class="cell-odds"><span class="cancel">取消</span></td>';
      } else {
        html += '<td class="cell-odds"><div class="pop">' + h.pop + '</div><div class="odds num' + (h.hot ? ' hot' : '') + '">' + h.odds + '</div></td>';
      }
      html += '<td class="cell-mark">' + (h.mark || '') + '</td>';
      html += '<td class="cell-tai"><span class="tw num">' + h.tai[0] + '</span><span class="tw-sep"></span><span class="tw num">' + h.tai[1] + '</span></td>';
      html += '<td class="cell-rate num">' + h.rate2 + '</td>';
      html += '<td class="cell-rate num">' + h.rate3 + '</td>';
      html += '<td>' + statBlock(h.res) + '</td>';
      html += '<td>' + condBlock(h.cond) + '</td>';
      html += '<td class="cell-train"><div class="tn">' + h.trainer + '</div><div class="tb">(' + h.belong + ')</div></td>';
      html += '<td>' +
        '<div class="blood-line">' + h.sire + '</div>' +
        '<div class="blood-line">' + h.dam + '</div>' +
        '<div class="blood-line muted">' + h.damSire + '</div>' +
        '<div class="blood-line">' + h.coat + '</div>' +
      '</td>';
      html += '</tr>';
      return html;
    }
    var body = document.getElementById('horseBody');
    horses.forEach(function (h) { body.innerHTML += horseRow(h); });

    var records = [
      { date: '2025/04/15', track: '名古屋', dist: 'ダ 200',  name: 'スタールーズベルト', jockey: '山田太郎', time: '0:11.9', cond: '良',   carry: '56.0' },
      { date: '2025/03/20', track: '金沢',   dist: 'ダ 1500', name: 'ネオアマゾネス',       jockey: '筒井勇介', time: '1:34.2', cond: '稍重', carry: '55.0' },
      { date: '2024/12/10', track: '笠松',   dist: 'ダ 1400', name: 'テイオーナントカ',     jockey: '鈴木次郎', time: '1:27.5', cond: '重',   carry: '54.0' },
      { date: '2024/10/05', track: '名古屋', dist: 'ダ 1800', name: 'ナントカテイオー',     jockey: '佐藤三郎', time: '1:55.8', cond: '良',   carry: '56.0' },
      { date: '2024/07/22', track: '金沢',   dist: 'ダ 900',  name: 'スタールーズベルト', jockey: '山田太郎', time: '0:54.3', cond: '不良', carry: '55.0' }
    ];
    var recBody = document.getElementById('recordBody');
    records.forEach(function (r) {
      recBody.innerHTML += '<tr>' +
        '<td class="num">' + r.date + '</td>' +
        '<td>' + r.track + '</td>' +
        '<td class="num">' + r.dist + '</td>' +
        '<td class="rec-name">' + r.name + '</td>' +
        '<td>' + r.jockey + '</td>' +
        '<td class="num">' + r.time + '</td>' +
        '<td>' + r.cond + '</td>' +
        '<td class="num">' + r.carry + '</td>' +
      '</tr>';
    });
  })();
</script>
