<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, user-scalable=yes">
<title>盛岡 レース一覧</title>
<link rel="stylesheet" href="../assets/common.css">

<div class="screen">
  <div class="race-list">
    <!-- タイトル + まとめ投票 -->
    <div class="rl-head">
      <h1 class="rl-title">盛岡レース一覧</h1>
      <button type="button" class="rl-matome" data-action="matome">レースまとめ投票</button>
    </div>

    <!-- 開催日 + 払戻金一覧に切替 -->
    <div class="rl-subhead">
      <button type="button" class="rl-date" data-action="calendar">
        <span>2022年12月12日</span>
        <span class="rl-cal-icon"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="4.5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M3 9.5h18M8 2.5v4M16 2.5v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></span>
      </button>
      <button type="button" class="rl-switch" data-action="switchPayout">
        <span>払戻金一覧に切替</span>
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 9h13l-3.5-3.5M20 15H7l3.5 3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <!-- 凡例 -->
    <div class="rl-legend">
      <span class="rl-badge juhsho">重賞</span>
      <span class="rl-moon"><svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13 3a9 9 0 1 0 8 13A7 7 0 0 1 13 3z" fill="#ffffff"/></svg></span>
    </div>

    <div class="rl-list" id="rlList"></div>
  </div>

  <!-- 固定フッター -->
  <div class="rl-footer">
    <button type="button" class="rl-matome" data-action="matome">レースまとめ投票</button>
  </div>
</div>

<script src="../assets/common.js"></script>
<script>
  /* ===================== 全レース一覧 ===================== */
  (function () {
    var RACE_NAME = 'C-2-12組C2ファイナルレースナントカ杯';
    var RACE_META = 'ダ 1400m 右回り 8頭';

    // state: 'result'(確定/結果) | 'selling'(発売中/投票) | 'upcoming'(予定/開催予定)
    var races = [
      { no: 1,  juhsho: true,  state: 'result' },
      { no: 2,  juhsho: true,  state: 'result' },
      { no: 3,  juhsho: true,  state: 'result' },
      { no: 4,  juhsho: true,  state: 'selling', sub: '締切30分前', subRed: true },
      { no: 5,  juhsho: true,  state: 'selling', sub: '11:11締切' },
      { no: 6,  juhsho: true,  state: 'selling', sub: '11:11締切' },
      { no: 7,  juhsho: true,  state: 'selling', sub: '11:11締切' },
      { no: 8,  juhsho: true,  state: 'selling', sub: '11:11締切' },
      { no: 9,  juhsho: true,  state: 'selling', sub: '11:11締切' },
      { no: 10, juhsho: true,  state: 'selling', sub: '11:11締切' },
      { no: 11, juhsho: false, state: 'upcoming' },
      { no: 12, juhsho: true,  state: 'upcoming' }
    ];

    function statusHTML(r) {
      if (r.state === 'result')   return '<div class="rl-status">確定</div>';
      if (r.state === 'upcoming') return '<div class="rl-status">予定</div>';
      return '<div class="rl-status"><span class="sell">発売中</span>' +
             '<span class="sub' + (r.subRed ? ' red' : '') + '">' + r.sub + '</span></div>';
    }
    function primaryHTML(r) {
      if (r.state === 'result')   return '<button type="button" class="rl-primary result" data-action="result">結果</button>';
      if (r.state === 'upcoming') return '<button type="button" class="rl-primary upcoming" disabled>開催予定</button>';
      return '<button type="button" class="rl-primary vote" data-action="vote">投票</button>';
    }
    // enabled nav buttons are real anchors (common.js rewrites the href to the
    // clean / .html style this page was opened in); disabled ones are inert spans.
    function navBtn(label, route, enabled) {
      return enabled
        ? '<a class="rl-btn" data-route="' + route + '" href="' + route + '">' + label + '</a>'
        : '<span class="rl-btn disabled">' + label + '</span>';
    }
    function videoBtn(enabled) {
      return enabled
        ? '<button type="button" class="rl-btn" data-action="video">レース映像</button>'
        : '<span class="rl-btn disabled">レース映像</span>';
    }
    function raceHTML(r) {
      var sellable = r.state !== 'upcoming';
      return '<div class="rl-race">' +
        '<div class="rl-left">' +
          '<div class="rl-rno">' + r.no + 'R</div>' +
          (r.juhsho ? '<span class="rl-badge juhsho">重賞</span>' : '') +
          statusHTML(r) +
        '</div>' +
        '<div class="rl-main">' +
          '<div class="rl-main-top">' +
            '<div class="rl-info">' +
              '<div class="rl-name">' + RACE_NAME + '</div>' +
              '<div class="rl-meta">' + RACE_META + '</div>' +
            '</div>' +
            primaryHTML(r) +
          '</div>' +
          '<div class="rl-btns">' +
            navBtn('出走表', 'SpRaceInfo.do', true) +
            navBtn('オッズ', 'SpOddsVote.do', sellable) +
            navBtn('予想情報', 'SpTipsterVote.do', sellable) +
            videoBtn(r.state === 'result') +
          '</div>' +
        '</div>' +
      '</div>';
    }

    document.getElementById('rlList').innerHTML = races.map(raceHTML).join('');

    // Stub buttons (結果 / 投票 / レース映像 / まとめ投票 / 開催日 / 払戻金切替):
    // routing is wired natively later — for now just notify the shell.
    document.querySelector('.screen').addEventListener('click', function (e) {
      var el = e.target.closest && e.target.closest('[data-action]');
      if (!el) return;
      var host = el.closest('.rl-race');
      var payload = host ? { race: host.querySelector('.rl-rno').textContent } : {};
      if (typeof window.postToNative === 'function') {
        window.postToNative('raceList:' + el.getAttribute('data-action'), payload);
      }
    });
  })();
</script>

<!-- ===== JS bridge logic (added from index.html) ===== -->
<script>
(function () {
  /* Native bridge — name "race_list", via flutter_inappwebview.
     Deep links for the race/nav buttons; showModalUrl for the calendar.
     Every send is recorded in the on-screen debug log below.
     This block is additive: the page's original handler is left intact. */

  var JO_CD          = '03';
  var KAISAI_BI      = '20260721';
  var CALENDAR_URL   = 'https://bannn-1018.github.io/odds-2rentan-demo/autorace/S_SpRaceHeaderJPop.do';
  var CALENDAR_TITLE = '開催日選択';
  var MATOME_URL     = 'odds-sop://notification?action=1&screenId=CA109-81&joCd=03&raceNo=11&kaisaiBi=20260721';
  var PAYOUT_URL     = 'odds-sop://notification?action=1&screenId=CA104-02&joCd=03&kaisaiBi=20260721';

  /* row-scoped targets → screenId (need raceNo).
     keyed by data-action (投票/結果/映像) and data-route (nav buttons). */
  var SCREEN_ID = {
    'vote':             'CA109-01', // 投票
    'result':           'CA111-01', // 結果
    'video':            'CA110-01', // レース映像
    'SpRaceInfo.do':    'CA106-02', // 出走表
    'SpOddsVote.do':    'CA107-01', // オッズ
    'SpTipsterVote.do': 'CA108-01'  // 予想情報
  };

  function callNative(message, params) {
    var payload = { message: message, params: params };
    logBridgeSend(payload);
    try {
      if (window.flutter_inappwebview && window.flutter_inappwebview.callHandler) {
        window.flutter_inappwebview.callHandler('race_list', payload);
        return;
      }
      console.log('[race_list bridge]', payload); // dev fallback (plain browser)
    } catch (err) {
      console.error('[race_list bridge] failed:', err);
    }
  }

  function openDeepLink(url, label) {
    logBridgeSend({ message: label || 'deeplink', params: { url: url } });
    window.location.href = url;
  }

  function buildRaceUrl(screenId, raceNo) {
    return 'odds-sop://notification?action=1'
         + '&screenId=' + screenId
         + '&joCd=' + JO_CD
         + '&raceNo=' + raceNo
         + '&kaisaiBi=' + KAISAI_BI;
  }

  function raceNoFrom(el) {
    var host = el.closest('.rl-race');
    if (!host) return '';
    var noEl = host.querySelector('.rl-rno');
    if (!noEl) return '';
    var m = noEl.textContent.match(/\d+/); // "11R" → "11"
    return m ? m[0] : '';
  }

  document.querySelector('.screen').addEventListener('click', function (e) {
    var el = e.target.closest && e.target.closest('[data-action], [data-route]');
    if (!el) return;
    if (el.classList.contains('disabled') || el.disabled) return;

    var action = el.getAttribute('data-action');
    var route  = el.getAttribute('data-route');

    if (action === 'calendar')     { e.preventDefault(); callNative('showModalUrl', { url: CALENDAR_URL, title: CALENDAR_TITLE }); return; }
    if (action === 'matome')       { e.preventDefault(); openDeepLink(MATOME_URL, 'matome'); return; }
    if (action === 'switchPayout') { e.preventDefault(); openDeepLink(PAYOUT_URL, 'switchPayout'); return; }

    var screenId = SCREEN_ID[action || route];
    if (!screenId) return;
    e.preventDefault();
    var raceNo = raceNoFrom(el);
    openDeepLink(buildRaceUrl(screenId, raceNo), (action || route) + ' ' + raceNo + 'R');
  });

  /* ---- Bridge log debug tool (floating button + panel) ---- */
  var bridgeLog = [];
  function pad2(n) { return n < 10 ? '0' + n : '' + n; }
  function formatTime(d) { return pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds()); }

  function logBridgeSend(payload) {
    bridgeLog.unshift({ time: new Date(), message: payload.message, params: payload.params });
    renderBridgeLog();
    updateDebugBadge();
  }
  function renderBridgeLog() {
    var list = document.getElementById('debugLogList');
    if (!list) return;
    list.innerHTML = '';
    if (!bridgeLog.length) { list.innerHTML = '<div class="debug-empty">まだ送信はありません</div>'; return; }
    bridgeLog.forEach(function (entry) {
      var el = document.createElement('div');
      el.className = 'debug-entry';
      el.innerHTML = '<div class="entry-top"><span class="entry-message"></span><span class="entry-time">' + formatTime(entry.time) + '</span></div><pre></pre>';
      el.querySelector('.entry-message').textContent = entry.message;
      el.querySelector('pre').textContent = JSON.stringify(entry.params, null, 2);
      list.appendChild(el);
    });
  }
  function updateDebugBadge() {
    var b = document.getElementById('debugBadge');
    if (!b) return;
    b.textContent = bridgeLog.length;
    b.classList.toggle('show', bridgeLog.length > 0);
  }

  var style = document.createElement('style');
  style.textContent =
    '.debug-fab{position:fixed;right:18px;bottom:18px;width:52px;height:52px;border-radius:50%;background:#222;color:#fff;border:none;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 10px rgba(0,0,0,.3);cursor:pointer;z-index:9998;}' +
    '.debug-fab .badge-count{position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;background:#e53030;color:#fff;font-size:11px;font-weight:700;line-height:18px;text-align:center;display:none;}' +
    '.debug-fab .badge-count.show{display:block;}' +
    '.debug-panel{position:fixed;left:0;right:0;bottom:0;max-height:70vh;background:#fff;border-top:1px solid #ccc;border-radius:14px 14px 0 0;box-shadow:0 -4px 16px rgba(0,0,0,.15);display:flex;flex-direction:column;transform:translateY(100%);transition:transform .2s ease;z-index:9999;}' +
    '.debug-panel.open{transform:translateY(0);}' +
    '.debug-panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #e5e5e5;flex-shrink:0;}' +
    '.debug-panel-header h2{font-size:15px;font-weight:700;margin:0;}' +
    '.debug-panel-header .actions{display:flex;gap:8px;}' +
    '.debug-panel-header button{font-size:13px;font-weight:600;padding:6px 12px;border-radius:6px;border:1px solid #ccc;background:#fff;cursor:pointer;}' +
    '.debug-panel-header .btn-close{color:#fff;background:#222;border-color:#222;}' +
    '.debug-log-list{overflow-y:auto;padding:8px 16px 20px;flex:1;}' +
    '.debug-empty{color:#999;font-size:13px;text-align:center;padding:30px 0;}' +
    '.debug-entry{border:1px solid #e5e5e5;border-radius:8px;padding:10px 12px;margin-top:10px;font-size:12px;}' +
    '.debug-entry .entry-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}' +
    '.debug-entry .entry-message{font-weight:700;font-size:13px;color:#d95f0a;}' +
    '.debug-entry .entry-time{color:#999;font-size:11px;}' +
    '.debug-entry pre{background:#f7f7f7;border-radius:6px;padding:8px;font-size:11px;white-space:pre-wrap;word-break:break-all;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;margin:0;}';
  document.head.appendChild(style);

  var fab = document.createElement('button');
  fab.className = 'debug-fab'; fab.id = 'debugFab'; fab.setAttribute('aria-label', 'ブリッジ送信ログ');
  fab.innerHTML = '📋<span class="badge-count" id="debugBadge">0</span>';
  var panel = document.createElement('div');
  panel.className = 'debug-panel'; panel.id = 'debugPanel';
  panel.innerHTML =
    '<div class="debug-panel-header"><h2>送信ログ（race_list）</h2>' +
    '<div class="actions"><button type="button" id="debugClear">クリア</button>' +
    '<button type="button" class="btn-close" id="debugCloseBtn">閉じる</button></div></div>' +
    '<div class="debug-log-list" id="debugLogList"><div class="debug-empty">まだ送信はありません</div></div>';
  document.body.appendChild(fab);
  document.body.appendChild(panel);
  fab.addEventListener('click', function () { panel.classList.add('open'); });
  document.getElementById('debugCloseBtn').addEventListener('click', function () { panel.classList.remove('open'); });
  document.getElementById('debugClear').addEventListener('click', function () { bridgeLog = []; renderBridgeLog(); updateDebugBadge(); });
})();
</script>
