<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>内訳編集</title>
<style>
  :root {
    --black: #333333;
    --gray-border: #dedede;
    --gray-text: #999999;
    --orange: #e7750c;
    --green: #00943c;
    --brand: #1a9f5c;
    --font-jp: "Hiragino Kaku Gothic ProN", "Hiragino Kaku Gothic Pro", "Hiragino Sans", "Yu Gothic", sans-serif;
    --font-num: -apple-system, "SF Pro", "Helvetica Neue", Arial, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-jp); color: var(--black); background: #fff;
    -webkit-font-smoothing: antialiased;
  }
  .modal-head {
    display: flex; align-items: center; justify-content: center;
    position: relative; padding: 20px 16px 16px;
  }
  .modal-head .title { font-size: 16px; font-weight: 600; }
  .modal-head .close {
    position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; padding: 4px;
  }
  .body { padding: 0 16px 24px; }
  .section-bar {
    background: #4f4f4f; color: #fff; font-size: 11px; font-weight: 600;
    padding: 4px 8px; border-radius: 2px; margin: 12px 0 4px;
  }
  .coin-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid #eee; gap: 12px;
  }
  .coin-row .info .term { font-size: 11px; font-weight: 300; line-height: 1.3; }
  .coin-row .info .held { font-size: 14px; font-weight: 600; font-family: var(--font-num); }
  .coin-row .edit { display: flex; align-items: center; gap: 4px; }
  .coin-row .edit input {
    width: 64px; height: 36px; border: 1px solid var(--gray-border); border-radius: 8px;
    text-align: right; padding: 0 8px; font-family: var(--font-num);
    font-size: 15px; color: var(--black);
  }
  .coin-row .edit input:focus { outline: none; border-color: var(--brand); }
  .coin-row .edit .suffix { font-size: 12px; font-weight: 600; white-space: nowrap; }
  .coin-row .value { font-size: 14px; font-family: var(--font-num); }
  .total-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; border-bottom: 1px solid #eee;
  }
  .total-row .l { font-size: 13px; font-weight: 600; }
  .total-row .v { font-size: 15px; font-weight: 700; font-family: var(--font-num); }
  .total-row .v .yen { font-size: 12px; font-family: var(--font-jp); font-weight: 600; }
  .btns { display: flex; gap: 8px; margin-top: 20px; }
  .btn-auto {
    flex: 1; background: #fff; color: var(--orange); border: 1px solid var(--orange);
    border-radius: 4px; height: 48px; font-family: var(--font-jp);
    font-size: 12px; font-weight: 600; cursor: pointer; line-height: 1.3;
  }
  .btn-apply {
    flex: 1; background: var(--orange); color: #fff; border: none; border-radius: 4px;
    height: 48px; font-family: var(--font-jp); font-size: 14px; font-weight: 600; cursor: pointer;
  }
</style>
<script>
  // Per-game brand colour inferred from the URL path (keiba/keirin/autorace).
  (function () {
    var BRAND = { keiba: '#1a9f5c', keirin: '#0180b6', autorace: '#9674e0' };
    var parts = location.pathname.split('/').filter(Boolean);
    for (var i = 0; i < parts.length; i++) {
      if (BRAND[parts[i]]) {
        document.documentElement.style.setProperty('--brand', BRAND[parts[i]]);
        break;
      }
    }
  })();
</script>
</head>
<body>

<div class="modal-head">
  <span class="title">内訳編集</span>
  <button class="close" id="closeBtn" aria-label="閉じる">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"><path d="M2 2l12 12M14 2L2 14"/></svg>
  </button>
</div>
<div class="body">
  <div class="section-bar">限定OPコイン</div>
  <div class="coin-row">
    <div class="info">
      <div class="term">25/06/30まで_全競技</div>
      <div class="held">99,990,000円</div>
    </div>
    <div class="edit">
      <input type="text" inputmode="numeric" class="js-limited" value="0">
      <span class="suffix">00円</span>
    </div>
  </div>
  <div class="coin-row">
    <div class="info">
      <div class="term">25/07/31まで_全競技</div>
      <div class="held">99,990,000円</div>
    </div>
    <div class="edit">
      <input type="text" inputmode="numeric" class="js-limited" value="1">
      <span class="suffix">00円</span>
    </div>
  </div>
  <div class="total-row">
    <span class="l">限定OPコイン使用額合計</span>
    <span class="v"><span id="limitedTotal">100</span><span class="yen">円</span></span>
  </div>
  <div class="section-bar">OPコイン</div>
  <div class="coin-row">
    <div class="info">
      <div class="term">使用可能額</div>
      <div class="held">99,990,000円</div>
    </div>
    <span class="value">100円</span>
  </div>
  <div class="total-row">
    <span class="l">OPコイン使用額合計</span>
    <span class="v"><span id="opTotal">100</span><span class="yen">円</span></span>
  </div>
  <div class="btns">
    <button class="btn-auto" id="autoBtn">自動でおまかせに<br>変更する</button>
    <button class="btn-apply" id="applyBtn">内容を変更する</button>
  </div>
</div>

<script>
  // Web→Native (guideline 03): callHandler('NativeApp', json) trả về Promise.
  const sendToNative = async (action, payload) => {
    const requestData = { action, payload: payload || {} };
    if (window.flutter_inappwebview &&
        typeof window.flutter_inappwebview.callHandler === 'function') {
      return await window.flutter_inappwebview.callHandler(
        'NativeApp', JSON.stringify(requestData));
    }
    console.log('[mock-bridge] flutter_inappwebview not available:', JSON.stringify(requestData));
    return null;
  };

  const fmt = (n) => n.toLocaleString('ja-JP');
  const limitedInputs = Array.from(document.querySelectorAll('.js-limited'));
  const recalc = () => {
    const limited = limitedInputs.reduce((sum, el) => sum + (Number(el.value) || 0), 0) * 100;
    document.getElementById('limitedTotal').textContent = fmt(limited);
    document.getElementById('opTotal').textContent = fmt(limited);
  };
  limitedInputs.forEach((el) => el.addEventListener('input', recalc));
  recalc();

  document.getElementById('autoBtn').addEventListener('click', () => {
    limitedInputs[0].value = '0';
    limitedInputs[1].value = '1';
    recalc();
  });

  document.getElementById('applyBtn').addEventListener('click', () => {
    // spec §④ row 56 (OP coin modal): updatePlanOpCoin KHÔNG kèm tham số — chỉ là
    // FLAG yêu cầu webview chính (bên dưới modal) reload lại nội dung (webview chính
    // tự lấy lại số liệu OP coin mới sau khi reload). Sau đó closeModal đóng sheet.
    sendToNative('updatePlanOpCoin');
    sendToNative('closeModal', {});
  });
  document.getElementById('closeBtn').addEventListener('click', () => {
    sendToNative('closeModal', {});
  });
</script>
</body>
</html>
