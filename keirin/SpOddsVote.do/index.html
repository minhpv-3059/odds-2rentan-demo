<script src="/assets/common.js"></script>
<script>
  /* ===================== オッズ (odds table) ===================== */
  // オッズ画面ではカートバーを常時表示。
  window.setCart(true);

  // 券種 / 表示順の小タブ（single-select）。パラメータ連動は後日実装。
  document.querySelectorAll('[data-group]').forEach(function (group) {
    group.addEventListener('click', function (e) {
      var btn = e.target.closest('button');
      if (!btn) return;
      group.querySelectorAll('button').forEach(function (b) { b.classList.toggle('active', b === btn); });
    });
  });

  (function () {
    var SEP_SVG = '<svg viewBox="0 0 8 8" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1.66667 3.66667C1.66667 3.48257 1.78274 3.33333 1.92593 3.33333H6.07407C6.21726 3.33333 6.33333 3.48257 6.33333 3.66667V4.33333C6.33333 4.51743 6.21726 4.66667 6.07407 4.66667H1.92593C1.78274 4.66667 1.66667 4.51743 1.66667 4.33333V3.66667Z" fill="currentColor"/></svg>';
    function defaultRow(i) { return { i: i, n1: '1', c1: '', n2: '2', c2: 'gray', odds: '48.2', hi: false, hot: false }; }

    var rows1to25 = [];
    for (var i = 1; i <= 25; i++) rows1to25.push(defaultRow(i));
    rows1to25[0] = { i: 1, n1: '2', c1: 'gray', n2: '4', c2: 'blue', odds: '4.5', hi: false, hot: true };
    rows1to25[1] = { i: 2, n1: '1', c1: '', n2: '2', c2: 'gray', odds: '9999.0', hi: true, hot: false };
    rows1to25[2] = { i: 3, n1: '1', c1: '', n2: '2', c2: 'gray', odds: '48.2', hi: true, hot: false };
    rows1to25[4] = { i: 5, n1: '1', c1: '', n2: '2', c2: 'gray', odds: '4.5', hi: true, hot: true };

    var rows26to50 = [];
    for (var j = 26; j <= 50; j++) rows26to50.push(defaultRow(j));
    rows26to50[0] = { i: 26, n1: '5', c1: 'yellow', n2: '6', c2: 'green', odds: '37.1', hi: false, hot: false };

    function rowHTML(r) {
      return '<div class="odds-tr">' +
        '<div class="odds-th' + (r.hi ? ' hi' : '') + '"><span class="num">' + r.i + '</span></div>' +
        '<div class="odds-td' + (r.hi ? ' hi' : '') + '">' +
          '<div class="badges">' +
            '<span class="badge' + (r.c1 ? ' ' + r.c1 : '') + '">' + r.n1 + '</span>' +
            '<span class="sep">' + SEP_SVG + '</span>' +
            '<span class="badge' + (r.c2 ? ' ' + r.c2 : '') + '">' + r.n2 + '</span>' +
          '</div>' +
          '<span class="odds-val num' + (r.hot ? ' hot' : '') + '">' + r.odds + '</span>' +
        '</div>' +
      '</div>';
    }

    var wrap = document.getElementById('oddsTables');
    var left = document.createElement('div');
    var right = document.createElement('div');
    left.className = 'odds-table';
    right.className = 'odds-table';
    rows1to25.forEach(function (r) { left.innerHTML += rowHTML(r); });
    rows26to50.forEach(function (r) { right.innerHTML += rowHTML(r); });
    wrap.appendChild(left);
    wrap.appendChild(right);
  })();
</script>
